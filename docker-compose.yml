version: '3.8'

services:
  android-builder:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: android_build_container
    volumes:
      - .:/app
    working_dir: /app
    command: ["./gradlew", "assembleDebug"]
    environment:
      - DOCKER_USERNAME=${DOCKER_USERNAME}
      - DOCKER_PASSWORD=${DOCKER_PASSWORD}
