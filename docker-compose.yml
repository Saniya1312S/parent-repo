version: '3.8'

services:
  android-builder:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: android_build_container
    volumes:
      - .:/app
    working_dir: /app
    command: ["./gradlew", "assembleDebug"]
    environment:
      ANDROID_SDK_ROOT: /opt/android-sdk
      GRADLE_USER_HOME: /app/.gradle
    tty: true
