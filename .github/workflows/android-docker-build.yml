name: Build Android Docker Image

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v3

    - name: Build Docker image
      run: docker build -t android-app .

    - name: Run Gradle build in Docker container
      run: docker run --rm android-app
