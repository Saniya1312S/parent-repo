name: Android Build with Docker Compose

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build with Docker Compose
        run: |
          docker compose -f docker-compose.yml up --build -d

      # ✅ Final Step: Tag and Push Image to Docker Hub
      - name: Tag and Push Image to Docker Hub
        run: |
          IMAGE_NAME=saniya1312/parent-repo:latest
          
          # Use the name of your built image or container here
          docker commit android_build_container $IMAGE_NAME
          
          docker push $IMAGE_NAME
